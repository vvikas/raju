name: LLM Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Fan-out: run each model's tests in parallel ───────────────────────────
  test-llm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # run all models even if one fails
      matrix:
        model:
          - name: "Qwen2 1.5B"
            filename: "qwen2-1_5b-instruct-q4_k_m.gguf"
            url: "https://huggingface.co/Qwen/Qwen2-1.5B-Instruct-GGUF/resolve/main/qwen2-1_5b-instruct-q4_k_m.gguf"
          - name: "SmolLM2 1.7B"
            filename: "smollm2-1.7b-instruct-q4_k_m.gguf"
            url: "https://huggingface.co/bartowski/SmolLM2-1.7B-Instruct-GGUF/resolve/main/SmolLM2-1.7B-Instruct-Q4_K_M.gguf"

    name: Test — ${{ matrix.model.name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: sudo apt-get install -y cmake build-essential

      - name: Cache llama.cpp build
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: ~/llama.cpp/build
          key: llama-cpp-build-${{ runner.os }}-v2

      - name: Build llama-server from source
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp ~/llama.cpp
          cmake -B ~/llama.cpp/build -S ~/llama.cpp -DGGML_METAL=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build ~/llama.cpp/build --config Release --target llama-server -j4

      - name: Cache Model — ${{ matrix.model.name }}
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ~/models/${{ matrix.model.filename }}
          key: model-${{ matrix.model.filename }}

      - name: Download Model — ${{ matrix.model.name }}
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/models
          wget -q --show-progress "${{ matrix.model.url }}" \
            -O ~/models/${{ matrix.model.filename }}

      - name: Start llama-server with ${{ matrix.model.name }}
        run: |
          ~/llama.cpp/build/bin/llama-server \
            -m ~/models/${{ matrix.model.filename }} \
            -c 2048 --host 127.0.0.1 --port 8080 &
          echo "Waiting for llama-server..."
          timeout 180 bash -c 'until curl -sf http://127.0.0.1:8080/health; do sleep 3; done'
          echo "Ready!"

      - name: Run Test Suite — ${{ matrix.model.name }}
        run: python3 test_llm.py --model "${{ matrix.model.name }}"

      - name: Upload badge JSON as artifact
        if: always()   # upload even if tests failed (so we get the score)
        uses: actions/upload-artifact@v4
        with:
          name: badge-${{ matrix.model.name }}
          path: ci-results/

  # ── Fan-in: wait for all models, then do ONE commit ───────────────────────
  commit-badges:
    runs-on: ubuntu-latest
    needs: test-llm
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all badge artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: badge-*
          path: /tmp/badge-artifacts/
          merge-multiple: false   # keep subdirs so we can see what downloaded

      - name: Flatten badge artifacts into ci-results/
        run: |
          mkdir -p ci-results
          # Each artifact is in /tmp/badge-artifacts/<artifact-name>/*.json
          find /tmp/badge-artifacts -name "*.json" -exec cp {} ci-results/ \;
          echo "Files in ci-results after flatten:"
          ls -la ci-results/

      - name: Commit all badge results in one push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ci-results/
          git diff --staged --quiet && echo "No badge changes." && exit 0
          git commit -m "ci: update test badges [skip ci]"
          git push origin main
